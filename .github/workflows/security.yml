# Security: Dependency audit + CodeQL analysis
# Runs on push to main, weekly schedule, and PRs.

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=high --json > audit-report.json || true

          # Parse and display results
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json)
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)

          echo "High: $HIGH | Critical: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities!"
            exit 1
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::Found $HIGH high-severity vulnerabilities."
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --production --json --out licenses.json

          # Flag problematic licenses
          BANNED="GPL-3.0,AGPL-3.0,SSPL-1.0"
          FOUND_ISSUES=0

          for LICENSE in $(echo "$BANNED" | tr ',' '\n'); do
            COUNT=$(jq --arg lic "$LICENSE" '[to_entries[] | select(.value.licenses == $lic)] | length' licenses.json)
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning::Found $COUNT packages with $LICENSE license"
              FOUND_ISSUES=$((FOUND_ISSUES + COUNT))
            fi
          done

          if [ "$FOUND_ISSUES" -gt 0 ]; then
            echo "::warning::$FOUND_ISSUES packages have potentially incompatible licenses."
          fi

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30
