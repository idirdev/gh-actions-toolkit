# Stale: Automatically close stale issues and PRs
# Runs daily at midnight UTC.

name: Stale

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues & PRs
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale items
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had any activity in the last 30 days. It will be closed in 7 days
            if no further activity occurs. If this issue is still relevant,
            please leave a comment or remove the stale label.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Feel free to reopen it if it's still relevant.
          exempt-issue-labels: pinned,security,bug

          # Pull Requests
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had any activity in the last 14 days. It will be closed
            in 7 days if no further activity occurs.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Feel free to reopen it when you're ready to continue.
          exempt-pr-labels: pinned,do-not-close

          # General
          operations-per-run: 100
          ascending: true
          delete-branch: false
